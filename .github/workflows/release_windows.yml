name: Build Windows Libraries

# GitHub Actions workflow for building and packaging RadarSimLib on Windows platforms.
#
# This workflow builds RadarSimLib across different license configurations (on/off)
# and architectures (CPU/GPU). It provides comprehensive Windows coverage with
# both CPU-only and CUDA GPU-accelerated builds.
#
# Build Matrix:
# - Windows 2025: MSVC compiler, 4 builds (2 architectures × 2 license configs)
# - Architectures: CPU (x86_64), GPU (CUDA)
# - License configs: on (with verification), off (open source)
# - Total builds: 4
#
# Features:
# - CUDA toolkit setup for GPU builds
# - Build optimization and caching
# - Artifact verification and validation2
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by architecture and license
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to master branch
# - Pull requests to master branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows CPU with license verification
          - license: on
            arch: cpu
            artifact_name: radarsimlib_win_x86_64_cpu_licensed
          # Windows CPU open source
          - license: off
            arch: cpu
            artifact_name: radarsimlib_win_x86_64_cpu
          # Windows GPU with license verification
          - license: on
            arch: gpu
            artifact_name: radarsimlib_win_x86_64_gpu_licensed
          # Windows GPU open source
          - license: off
            arch: gpu
            artifact_name: radarsimlib_win_x86_64_gpu_free

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup CUDA Toolkit
        if: matrix.arch == 'gpu'
        uses: N-Storm/cuda-toolkit@v0.2.27m
        with:
          cuda: '13.0.0'
          method: 'local'
          use-github-cache: false

      - name: Verify CUDA installation
        if: matrix.arch == 'gpu'
        run: |
          echo "::group::CUDA Verification"
          nvcc --version
          echo "CUDA_PATH: %CUDA_PATH%"
          echo "PATH: %PATH%"
          if exist "%CUDA_PATH%\bin\" (
            dir "%CUDA_PATH%\bin\" | findstr nvcc
          ) else (
            echo "CUDA bin directory not found"
          )
          if exist "%CUDA_PATH%\lib\x64\" (
            echo "CUDA lib directory found"
          ) else (
            echo "CUDA lib directory not found"
          )
          echo "::endgroup::"
        shell: cmd

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: windows-latest"
          echo "License: ${{ matrix.license }}"
          echo "Architecture: ${{ matrix.arch }}"
          if "${{ matrix.arch }}" == "gpu" (
            echo "CUDA Version: $(nvcc --version | findstr "release" | for /f "tokens=5" %%a in ('findstr "release"') do echo %%a)"
          )
          echo "::endgroup::"

          echo "::group::System Information"
          systeminfo | findstr /C:"OS Name" /C:"OS Version"
          if "${{ matrix.arch }}" == "gpu" (
            nvcc --version
          )
          echo "::endgroup::"
        shell: cmd

      - name: Build RadarSimLib
        env:
          CUDA_PATH: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDA_HOME: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDACXX: ${{ matrix.arch == 'gpu' && format('{0}\bin\nvcc.exe', env.CUDA_PATH) || '' }}
          CUDA_TOOLKIT_ROOT_DIR: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
        run: |
          echo "::group::Build Process"
          .\build.bat --arch=${{ matrix.arch }} --license=${{ matrix.license }} --test=${{ matrix.license == 'on' && matrix.arch == 'cpu' && 'on' || 'off' }}
          echo "::endgroup::"
        shell: cmd

      - name: Create build summary
        run: |
          echo "## Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $env:GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| OS | windows-latest |" >> $env:GITHUB_STEP_SUMMARY
          echo "| License | ${{ matrix.license }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $env:GITHUB_STEP_SUMMARY
        shell: powershell

      - name: Archive built module
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: .\radarsimlib_win_x86_64_${{ matrix.arch }}${{ matrix.license == 'off' && '' || '_licensed' }}
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            .\build_logs\
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            radarsimlib_win_x86_64_cpu*
            radarsimlib_win_x86_64_gpu*

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.dll" -o -name "*.h" -o -name "*.lib" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimlib_windows_all

          # Create the directory structure for license-based archives
          mkdir -p packed/radarsimlib_windows_all/unlicensed
          mkdir -p packed/radarsimlib_windows_all/licensed

          # Create temporary directories for organizing files before zipping
          mkdir -p temp/unlicensed/Windows_x86_64_CPU
          mkdir -p temp/unlicensed/Windows_x86_64_GPU
          mkdir -p temp/licensed/Windows_x86_64_CPU
          mkdir -p temp/licensed/Windows_x86_64_GPU

          # Copy each artifact to appropriate directory based on architecture and license
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"
              
              # Determine target directory based on artifact name
              if [[ "$artifact_name" == *"gpu"* ]]; then
                # GPU builds
                if [[ "$artifact_name" == *"_licensed"* ]]; then
                  target_dir="temp/licensed/Windows_x86_64_GPU"
                else
                  target_dir="temp/unlicensed/Windows_x86_64_GPU"
                fi
              else
                # CPU builds
                if [[ "$artifact_name" == *"_licensed"* ]]; then
                  target_dir="temp/licensed/Windows_x86_64_CPU"
                else
                  target_dir="temp/unlicensed/Windows_x86_64_CPU"
                fi
              fi
              
              # Ensure target directory exists
              mkdir -p "$target_dir"
              
              # Copy the library contents
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

          # Create zip files for each license/architecture combination
          cd temp
          
          # Create zip files in licensed directory
          cd licensed
          zip -r ../../packed/radarsimlib_windows_all/licensed/Windows_x86_64_CPU.zip Windows_x86_64_CPU/
          zip -r ../../packed/radarsimlib_windows_all/licensed/Windows_x86_64_GPU.zip Windows_x86_64_GPU/
          cd ..
          
          # Create zip files in unlicensed directory
          cd unlicensed
          zip -r ../../packed/radarsimlib_windows_all/unlicensed/Windows_x86_64_CPU.zip Windows_x86_64_CPU/
          zip -r ../../packed/radarsimlib_windows_all/unlicensed/Windows_x86_64_GPU.zip Windows_x86_64_GPU/
          cd ..
          
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimlib_windows_all -type f | sort
          echo ""
          echo "Zip files created:"
          ls -la packed/radarsimlib_windows_all/licensed/*.zip packed/radarsimlib_windows_all/unlicensed/*.zip
          echo ""
          echo "Archive sizes:"
          ls -lh packed/radarsimlib_windows_all/licensed/*.zip packed/radarsimlib_windows_all/unlicensed/*.zip
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          cat > packed/radarsimlib_windows_all/README.md << 'EOF'
          # RadarSimLib Windows Build Artifacts

          This archive contains all RadarSimLib builds for Windows platforms organized by license configuration and architecture.

          ## Directory Structure

          The builds are organized in the following structure:

          ```
          licensed/
          ├── Windows_x86_64_CPU.zip
          └── Windows_x86_64_GPU.zip

          unlicensed/
          ├── Windows_x86_64_CPU.zip
          └── Windows_x86_64_GPU.zip
          ```

          ## Zip File Contents

          Each zip file contains the following:
          - `radarsimc.dll` - Dynamic library
          - `radarsimc.lib` - Import library for linking
          - `radarsim.h` - Header file for C/C++ integration

          ## Architecture and License Information

          ### Licensed Builds
          - **Windows_x86_64_CPU.zip**: License-enabled CPU-only build
          - **Windows_x86_64_GPU.zip**: License-enabled CUDA GPU-accelerated build
          - Requires valid license file for full feature access
          - License activation via `Set_License()` or `Set_License_Files()` API
          - Verification via `Is_Licensed()` call

          ### Unlicensed Builds (Open Source)
          - **Windows_x86_64_CPU.zip**: Open source CPU-only build
          - **Windows_x86_64_GPU.zip**: Open source CUDA GPU-accelerated build
          - No license verification required
          - All features enabled by default
          - Suitable for development, testing, and non-commercial use

          ## Build Information

          - **Total Builds**: 4 zip files (2 architectures × 2 license configs)
          - **Architectures**: x86_64 CPU, x86_64 GPU (CUDA)
          - **License Configs**: Licensed (with verification), Unlicensed (open source)
          - **Library Type**: Dynamic library (.dll) with import library (.lib)
          - **Compiler**: MSVC
          - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Usage

          1. Choose the appropriate license configuration based on your needs:
             - **Licensed**: For commercial use with valid license
             - **Unlicensed**: For development, testing, and evaluation
          2. Choose the appropriate architecture (CPU or GPU) for your system
          3. Extract the corresponding zip file
          4. Link against radarsimc.lib and include radarsim.h in your project
          5. Ensure radarsimc.dll is accessible at runtime

          ## License Activation (Licensed Builds Only)

          For licensed builds, place your license file (`license_radarsimc_*.lic`) in:
          - Your application's working directory, or
          - Use `Set_License()` API to activate programmatically

          Verify activation status with `Is_Licensed()` API call.

          ## Requirements

          ### CPU Builds (Windows_x86_64_CPU.zip)
          - Any x86_64 Windows system
          - Microsoft Visual C++ Redistributable

          ### GPU Builds (Windows_x86_64_GPU.zip)
          - x86_64 Windows system with NVIDIA GPU
          - CUDA 12.8.1 or compatible version
          - Microsoft Visual C++ Redistributable
          EOF

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimlib_windows_all_builds.tar.gz radarsimlib_windows_all/

          # Create zip version as well
          zip -r radarsimlib_windows_all_builds.zip radarsimlib_windows_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radarsimlib_windows_all_builds
          path: |
            packed/radarsimlib_windows_all_builds.tar.gz
            packed/radarsimlib_windows_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [build, pack-artifacts]
    runs-on: windows-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "# Windows RadarSimLib Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $env:GITHUB_STEP_SUMMARY
          echo "Total builds: 4 - 2 architectures x 2 license configs" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $env:GITHUB_STEP_SUMMARY
          echo "- **CPU x86_64**: 2 builds on windows-latest" >> $env:GITHUB_STEP_SUMMARY
          echo "- **GPU CUDA**: 2 builds on windows-latest" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### License Configuration Distribution" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Licensed**: 2 builds - CPU and GPU" >> $env:GITHUB_STEP_SUMMARY
          echo "- **Unlicensed**: 2 builds - CPU and GPU" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimlib_win_x86_64_cpu`` - Unlicensed CPU" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimlib_win_x86_64_cpu_licensed`` - Licensed CPU" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimlib_win_x86_64_gpu_free`` - Unlicensed GPU" >> $env:GITHUB_STEP_SUMMARY
          echo "- ``radarsimlib_win_x86_64_gpu_licensed`` - Licensed GPU" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.pack-artifacts.result }}" -eq "success") {
            echo "**All artifacts successfully packed into single archive**" >> $env:GITHUB_STEP_SUMMARY
            echo "- Archive: ``radarsimlib_windows_all_builds``" >> $env:GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $env:GITHUB_STEP_SUMMARY
            echo "- Contains: All 4 build variants organized by license config and architecture" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Artifact packing failed or was skipped**" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.build.result }}" -eq "success") {
            echo "**All builds completed successfully!**" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Some builds may have failed. Check individual job logs for details.**" >> $env:GITHUB_STEP_SUMMARY
          }
        shell: powershell
