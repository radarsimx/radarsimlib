name: Build Windows Libraries

# GitHub Actions workflow for building and packaging RadarSimLib on Windows platforms.
#
# This workflow builds RadarSimLib across different license configurations (on/off)
# and architectures (CPU/GPU). It provides comprehensive Windows coverage with
# both CPU-only and CUDA GPU-accelerated builds.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing an architecture (or the CUDA version) only
#   requires editing that one step — no other job needs to change.
# - Architectures: CPU (x86_64), GPU (CUDA)
# - All builds: License enabled (license=on)
#
# Features:
# - CUDA toolkit setup for GPU builds
# - Build optimization and caching
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by architecture
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to main branch
# - Pull requests to main branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding architectures or the CUDA version.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            { "arch": "cpu", "artifact_name": "radarsimlib_win_x86_64_cpu" },
            { "arch": "gpu", "artifact_name": "radarsimlib_win_x86_64_gpu", "cuda_version": "13.3.1" }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: windows-2025
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup CUDA Toolkit
        if: matrix.arch == 'gpu'
        uses: radarsimx/cuda-toolkit@master
        with:
          cuda: ${{ matrix.cuda_version }}
          method: 'local'
          use-github-cache: false

      - name: Verify CUDA installation
        if: matrix.arch == 'gpu'
        run: |
          echo "::group::CUDA Verification"
          nvcc --version
          echo "CUDA_PATH: %CUDA_PATH%"
          echo "PATH: %PATH%"
          if exist "%CUDA_PATH%\bin\" (
            dir "%CUDA_PATH%\bin\" | findstr nvcc
          ) else (
            echo "CUDA bin directory not found"
          )
          if exist "%CUDA_PATH%\lib\x64\" (
            echo "CUDA lib directory found"
          ) else (
            echo "CUDA lib directory not found"
          )
          echo "::endgroup::"
        shell: cmd

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: windows-latest"
          echo "License: on"
          echo "Architecture: ${{ matrix.arch }}"
          if "${{ matrix.arch }}" == "gpu" (
            echo "CUDA Version: $(nvcc --version | findstr "release" | for /f "tokens=5" %%a in ('findstr "release"') do echo %%a)"
          )
          echo "::endgroup::"

          echo "::group::System Information"
          systeminfo | findstr /C:"OS Name" /C:"OS Version"
          if "${{ matrix.arch }}" == "gpu" (
            nvcc --version
          )
          echo "::endgroup::"
        shell: cmd

      - name: Build RadarSimLib
        env:
          CUDA_PATH: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDA_HOME: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDACXX: ${{ matrix.arch == 'gpu' && format('{0}\bin\nvcc.exe', env.CUDA_PATH) || '' }}
          CUDA_TOOLKIT_ROOT_DIR: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
        run: |
          echo "::group::Build Process"
          .\build.bat --arch=${{ matrix.arch }} --license=on --test=${{ matrix.arch == 'cpu' && 'on' || 'off' }}
          echo "::endgroup::"
        shell: cmd

      - name: Create build summary
        run: |
          echo "## Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $env:GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $env:GITHUB_STEP_SUMMARY
          echo "| OS | windows-latest |" >> $env:GITHUB_STEP_SUMMARY
          echo "| License | on |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $env:GITHUB_STEP_SUMMARY
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $env:GITHUB_STEP_SUMMARY
        shell: powershell

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: .\radarsimlib_win_x86_64_${{ matrix.arch }}
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            .\build_logs\
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.dll" -o -name "*.h" -o -name "*.lib" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimlib_windows_all

          # Build artifact_name -> arch lookup table from the matrix
          declare -A arch_for
          while IFS=$'\t' read -r name arch; do
            arch_for["$name"]="$arch"
          done < <(jq -r '.[] | [.artifact_name, .arch] | @tsv' matrix.json)

          # Copy each artifact to its matrix-defined directory
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              arch="${arch_for[$artifact_name]}"
              if [ -z "$arch" ]; then
                echo "Unknown artifact $artifact_name, skipping"
                continue
              fi
              target_dir="temp/Windows_x86_64_$(echo "$arch" | tr '[:lower:]' '[:upper:]')"

              mkdir -p "$target_dir"
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

          # Create one zip per architecture actually produced
          cd temp
          for combo_dir in */; do
            combo_dir="${combo_dir%/}"
            zip -r "../packed/radarsimlib_windows_all/${combo_dir}.zip" "$combo_dir/"
          done
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimlib_windows_all -type f | sort
          echo ""
          echo "Zip files created:"
          ls -la packed/radarsimlib_windows_all/*.zip
          echo ""
          echo "Archive sizes:"
          ls -lh packed/radarsimlib_windows_all/*.zip
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          total_builds=$(jq 'length' matrix.json)
          cuda_version=$(jq -r '[.[] | select(.arch=="gpu") | .cuda_version] | first // "N/A"' matrix.json)
          arch_list=$(jq -r '[.[] | if .arch=="gpu" then "x86_64 GPU (CUDA)" else "x86_64 CPU" end] | join(", ")' matrix.json)
          names=$(jq -r '.[] | "Windows_x86_64_\(.arch | ascii_upcase).zip"' matrix.json)
          n=$(echo "$names" | wc -l)

          {
            echo "# RadarSimLib Windows Build Artifacts"
            echo
            echo "This archive contains all RadarSimLib builds for Windows platforms with license features enabled."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimlib_windows_all/"
            i=0
            while read -r name; do
              i=$((i+1))
              if [ "$i" -eq "$n" ]; then
                echo "└── ${name}"
              else
                echo "├── ${name}"
              fi
            done <<< "$names"
            echo '```'
            echo
            echo "## Zip File Contents"
            echo
            echo "Each zip file contains the following:"
            echo '- `radarsimc.dll` - Dynamic library'
            echo '- `radarsimc.lib` - Import library for linking'
            echo '- `radarsim.h` - Header file for C/C++ integration'
            echo
            echo "## Architecture Information"
            echo
            echo "### All Builds (License-Enabled)"
            jq -r '.[] | "- **Windows_x86_64_\(.arch | ascii_upcase).zip**: \(if .arch=="gpu" then "CUDA GPU-accelerated" else "CPU-only" end) build with license verification"' matrix.json
            echo "- Requires valid license file for full feature access"
            echo '- License activation via `Set_License()` or `Set_License_Files()` API'
            echo '- Verification via `Is_Licensed()` call'
            echo
            echo "## Build Information"
            echo
            echo "- **Total Builds**: ${total_builds} zip files (${total_builds} architectures)"
            echo "- **Architectures**: ${arch_list}"
            echo "- **License**: All builds have license verification enabled"
            echo "- **Library Type**: Dynamic library (.dll) with import library (.lib)"
            echo "- **Compiler**: MSVC"
            echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo
            echo "## Usage"
            echo
            echo "1. Choose the appropriate architecture (CPU or GPU) for your system"
            echo "2. Extract the corresponding zip file"
            echo "3. Link against radarsimc.lib and include radarsim.h in your project"
            echo "4. Ensure radarsimc.dll is accessible at runtime"
            echo "5. Activate your license (see below)"
            echo
            echo "## License Activation"
            echo
            echo 'Place your license file (`license_radarsimc_*.lic`) in:'
            echo "- Your application's working directory, or"
            echo '- Use `Set_License()` API to activate programmatically'
            echo
            echo 'Verify activation status with `Is_Licensed()` API call.'
            echo
            echo "## Requirements"
            jq -r --arg cuda "$cuda_version" '.[] |
              if .arch == "gpu" then
                "\n### GPU Builds (Windows_x86_64_GPU.zip)\n- x86_64 Windows system with NVIDIA GPU\n- CUDA \($cuda) or compatible version\n- Microsoft Visual C++ Redistributable\n- Valid RadarSimLib license file"
              else
                "\n### CPU Builds (Windows_x86_64_CPU.zip)\n- Any x86_64 Windows system\n- Microsoft Visual C++ Redistributable\n- Valid RadarSimLib license file"
              end
            ' matrix.json
          } > packed/radarsimlib_windows_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimlib_windows_all_builds.tar.gz radarsimlib_windows_all/

          # Create zip version as well
          zip -r radarsimlib_windows_all_builds.zip radarsimlib_windows_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimlib_windows_all_builds
          path: |
            packed/radarsimlib_windows_all_builds.tar.gz
            packed/radarsimlib_windows_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: windows-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          $matrix = '${{ needs.setup.outputs.matrix }}' | ConvertFrom-Json
          $totalBuilds = $matrix.Count
          $archNames = ($matrix | ForEach-Object { $_.arch.ToUpper() }) -join ' and '
          $archList = ($matrix | ForEach-Object { if ($_.arch -eq 'gpu') { 'x86_64 GPU (CUDA)' } else { 'x86_64 CPU' } }) -join ', '

          echo "# Windows RadarSimLib Build Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $env:GITHUB_STEP_SUMMARY
          echo "Total builds: $totalBuilds - $archNames (all with license enabled)" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $env:GITHUB_STEP_SUMMARY
          foreach ($m in $matrix) {
            $label = if ($m.arch -eq 'gpu') { 'GPU CUDA' } else { 'CPU x86_64' }
            echo "- **$label**: 1 build on windows-latest" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### License Configuration" >> $env:GITHUB_STEP_SUMMARY
          echo "- All builds: License verification enabled" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $env:GITHUB_STEP_SUMMARY
          foreach ($m in $matrix) {
            $label = if ($m.arch -eq 'gpu') { 'GPU' } else { 'CPU' }
            echo "- ``$($m.artifact_name)`` - $label build with license" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.pack-artifacts.result }}" -eq "success") {
            echo "**All artifacts successfully packed into single archive**" >> $env:GITHUB_STEP_SUMMARY
            echo "- Archive: ``radarsimlib_windows_all_builds``" >> $env:GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $env:GITHUB_STEP_SUMMARY
            echo "- Contains: $totalBuilds build variants ($archList) with license verification" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Artifact packing failed or was skipped**" >> $env:GITHUB_STEP_SUMMARY
          }
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $env:GITHUB_STEP_SUMMARY
          if ("${{ needs.build.result }}" -eq "success") {
            echo "**All builds completed successfully!**" >> $env:GITHUB_STEP_SUMMARY
          } else {
            echo "**Some builds may have failed. Check individual job logs for details.**" >> $env:GITHUB_STEP_SUMMARY
          }
        shell: powershell
