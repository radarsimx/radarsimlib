name: Build Ubuntu Libraries

# GitHub Actions workflow for building and packaging RadarSimLib on Ubuntu Linux.
#
# This workflow builds RadarSimLib across different license configurations (on/off)
# and architectures (CPU/GPU). It provides comprehensive Linux coverage with
# both CPU-only and CUDA GPU-accelerated builds.
#
# Build Matrix:
# - Ubuntu 22.04 & 24.04: GCC compiler, 8 builds (2 versions × 2 architectures × 2 license configs)
# - Architectures: CPU (x86_64), GPU (CUDA)
# - License configs: on (with verification), off (open source)
# - Total builds: 8
#
# Features:
# - Comprehensive caching (apt, ccache)
# - CUDA toolkit setup for GPU builds
# - Build optimization with ccache
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by architecture and license
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to master branch
# - Pull requests to master branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  DEBIAN_FRONTEND: noninteractive
  CCACHE_DIR: ~/.ccache

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 CPU with license verification
          - os: ubuntu-22.04
            license: on
            arch: cpu
            c_compiler: gcc-11
            cxx_compiler: g++-11
            ubuntu_version: "22"
            artifact_name: radarsimlib_ubuntu22_x86_64_cpu_licensed
          # Ubuntu 22.04 CPU open source
          - os: ubuntu-22.04
            license: off
            arch: cpu
            c_compiler: gcc-11
            cxx_compiler: g++-11
            ubuntu_version: "22"
            artifact_name: radarsimlib_ubuntu22_x86_64_cpu
          # Ubuntu 22.04 GPU with license verification
          - os: ubuntu-22.04
            license: on
            arch: gpu
            c_compiler: gcc-11
            cxx_compiler: g++-11
            ubuntu_version: "22"
            artifact_name: radarsimlib_ubuntu22_x86_64_gpu_licensed
          # Ubuntu 22.04 GPU open source
          - os: ubuntu-22.04
            license: off
            arch: gpu
            c_compiler: gcc-11
            cxx_compiler: g++-11
            ubuntu_version: "22"
            artifact_name: radarsimlib_ubuntu22_x86_64_gpu_free
          # Ubuntu 24.04 CPU with license verification
          - os: ubuntu-24.04
            license: on
            arch: cpu
            c_compiler: gcc-13
            cxx_compiler: g++-13
            ubuntu_version: "24"
            artifact_name: radarsimlib_ubuntu24_x86_64_cpu_licensed
          # Ubuntu 24.04 CPU open source
          - os: ubuntu-24.04
            license: off
            arch: cpu
            c_compiler: gcc-13
            cxx_compiler: g++-13
            ubuntu_version: "24"
            artifact_name: radarsimlib_ubuntu24_x86_64_cpu
          # Ubuntu 24.04 GPU with license verification
          - os: ubuntu-24.04
            license: on
            arch: gpu
            c_compiler: gcc-13
            cxx_compiler: g++-13
            ubuntu_version: "24"
            artifact_name: radarsimlib_ubuntu24_x86_64_gpu_licensed
          # Ubuntu 24.04 GPU open source
          - os: ubuntu-24.04
            license: off
            arch: gpu
            c_compiler: gcc-13
            cxx_compiler: g++-13
            ubuntu_version: "24"
            artifact_name: radarsimlib_ubuntu24_x86_64_gpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup CUDA Toolkit
        if: matrix.arch == 'gpu'
        uses: Jimver/cuda-toolkit@v0.2.27
        with:
          cuda: "13.0.0"
          method: "network"
          sub-packages: '["nvcc"]'
          linux-local-args: '["--toolkit", "--silent"]'

      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/apt
            ~/.ccache
          key: ${{ runner.os }}-${{ matrix.license }}-${{ matrix.arch }}-${{ hashFiles('build.sh', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.license }}-${{ matrix.arch }}-
            ${{ runner.os }}-${{ matrix.license }}-
            ${{ runner.os }}-

      - name: Install build dependencies
        run: |
          echo "::group::Dependencies Installation"
          sudo apt-get update

          # Install common build dependencies
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            ccache
          
          # Set up ccache
          ccache --set-config=max_size=2G
          ccache --set-config=cache_dir=~/.ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          
          # Verify installations
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          cmake --version
          ccache --version
          echo "::endgroup::"

      - name: Verify CUDA installation
        if: matrix.arch == 'gpu'
        run: |
          echo "::group::CUDA Verification"
          nvcc --version
          echo "CUDA_PATH: $CUDA_PATH"
          echo "PATH: $PATH"
          if [ -d "$CUDA_PATH/bin" ]; then
            ls -la "$CUDA_PATH/bin/" | grep nvcc
          else
            echo "CUDA bin directory not found"
          fi
          if [ -d "$CUDA_PATH/lib64" ]; then
            echo "CUDA lib directory found"
          else
            echo "CUDA lib directory not found"
          fi
          echo "::endgroup::"

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: ${{ matrix.os }}"
          echo "Ubuntu Version: ${{ matrix.ubuntu_version }}"
          echo "License: ${{ matrix.license }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "C Compiler: ${{ matrix.c_compiler }}"
          echo "C++ Compiler: ${{ matrix.cxx_compiler }}"
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            nvcc_version=$(nvcc --version | grep "release" | sed 's/.*release \([0-9.]*\).*/\1/')
            echo "CUDA Version: $nvcc_version"
          fi
          echo "::endgroup::"

          echo "::group::System Information"
          lsb_release -a
          uname -a
          nproc
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            nvcc --version
          fi
          echo "::endgroup::"

      - name: Build RadarSimLib
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
          CUDA_PATH: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDA_HOME: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDACXX: ${{ matrix.arch == 'gpu' && format('{0}/bin/nvcc', env.CUDA_PATH) || '' }}
          CUDA_TOOLKIT_ROOT_DIR: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CCACHE_COMPILERCHECK: content
        run: |
          echo "::group::Build Process"
          chmod +x ./build.sh
          ./build.sh --arch=${{ matrix.arch }} --license=${{ matrix.license }} --test=${{ matrix.license == 'on' && matrix.arch == 'cpu' && 'on' || 'off' }} --verbose
          echo "::endgroup::"

      - name: Display build statistics
        if: always()
        run: |
          echo "::group::Build Statistics"
          ccache --show-stats
          echo "::endgroup::"

      - name: Create build summary
        run: |
          echo "## Build Summary 🛠️" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| OS | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ubuntu Version | ${{ matrix.ubuntu_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License | ${{ matrix.license }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | ${{ matrix.c_compiler }}/${{ matrix.cxx_compiler }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            echo "| CUDA Version | $(nvcc --version | grep "release" | sed 's/.*release \([0-9.]*\).*/\1/') |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Archive built module
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ./radarsimlib_ubuntu${{ matrix.ubuntu_version }}_x86_64_${{ matrix.arch }}${{ matrix.license == 'off' && '' || '_licensed' }}
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            ./build_logs/
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: |
            radarsimlib_ubuntu22_x86_64_cpu*
            radarsimlib_ubuntu22_x86_64_gpu*
            radarsimlib_ubuntu24_x86_64_cpu*
            radarsimlib_ubuntu24_x86_64_gpu*

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.so" -o -name "*.h" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimlib_ubuntu_all

          # Create the directory structure for license-based archives
          mkdir -p packed/radarsimlib_ubuntu_all/unlicensed
          mkdir -p packed/radarsimlib_ubuntu_all/licensed

          # Create temporary directories for organizing files before zipping
          mkdir -p temp/unlicensed/Ubuntu22_x86_64_CPU
          mkdir -p temp/unlicensed/Ubuntu22_x86_64_GPU
          mkdir -p temp/unlicensed/Ubuntu24_x86_64_CPU
          mkdir -p temp/unlicensed/Ubuntu24_x86_64_GPU
          mkdir -p temp/licensed/Ubuntu22_x86_64_CPU
          mkdir -p temp/licensed/Ubuntu22_x86_64_GPU
          mkdir -p temp/licensed/Ubuntu24_x86_64_CPU
          mkdir -p temp/licensed/Ubuntu24_x86_64_GPU

          # Copy each artifact to appropriate directory based on architecture and license
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"
              
              # Determine Ubuntu version
              if [[ "$artifact_name" == *"ubuntu22"* ]]; then
                ubuntu_ver="Ubuntu22"
              elif [[ "$artifact_name" == *"ubuntu24"* ]]; then
                ubuntu_ver="Ubuntu24"
              else
                echo "Unknown Ubuntu version for $artifact_name, skipping"
                continue
              fi
              
              # Determine target directory based on artifact name
              if [[ "$artifact_name" == *"gpu"* ]]; then
                # GPU builds
                if [[ "$artifact_name" == *"_licensed"* ]]; then
                  target_dir="temp/licensed/${ubuntu_ver}_x86_64_GPU"
                else
                  target_dir="temp/unlicensed/${ubuntu_ver}_x86_64_GPU"
                fi
              else
                # CPU builds
                if [[ "$artifact_name" == *"_licensed"* ]]; then
                  target_dir="temp/licensed/${ubuntu_ver}_x86_64_CPU"
                else
                  target_dir="temp/unlicensed/${ubuntu_ver}_x86_64_CPU"
                fi
              fi
              
              # Ensure target directory exists
              mkdir -p "$target_dir"
              
              # Copy the library contents
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

          # Create zip files for each license/architecture combination
          cd temp
          
          # Create zip files in licensed directory
          cd licensed
          zip -r ../../packed/radarsimlib_ubuntu_all/licensed/Ubuntu22_x86_64_CPU.zip Ubuntu22_x86_64_CPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/licensed/Ubuntu22_x86_64_GPU.zip Ubuntu22_x86_64_GPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/licensed/Ubuntu24_x86_64_CPU.zip Ubuntu24_x86_64_CPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/licensed/Ubuntu24_x86_64_GPU.zip Ubuntu24_x86_64_GPU/
          cd ..
          
          # Create zip files in unlicensed directory
          cd unlicensed
          zip -r ../../packed/radarsimlib_ubuntu_all/unlicensed/Ubuntu22_x86_64_CPU.zip Ubuntu22_x86_64_CPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/unlicensed/Ubuntu22_x86_64_GPU.zip Ubuntu22_x86_64_GPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/unlicensed/Ubuntu24_x86_64_CPU.zip Ubuntu24_x86_64_CPU/
          zip -r ../../packed/radarsimlib_ubuntu_all/unlicensed/Ubuntu24_x86_64_GPU.zip Ubuntu24_x86_64_GPU/
          cd ..
          
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimlib_ubuntu_all -type f | sort
          echo ""
          echo "Zip files created:"
          ls -la packed/radarsimlib_ubuntu_all/licensed/*.zip packed/radarsimlib_ubuntu_all/unlicensed/*.zip
          echo ""
          echo "Archive sizes:"
          ls -lh packed/radarsimlib_ubuntu_all/licensed/*.zip packed/radarsimlib_ubuntu_all/unlicensed/*.zip
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          cat > packed/radarsimlib_ubuntu_all/README.md << 'EOF'
          # RadarSimLib Ubuntu Build Artifacts

          This archive contains all RadarSimLib builds for Ubuntu platforms organized by license configuration, version and architecture.

          ## Directory Structure

          The builds are organized in the following structure:

          ```
          licensed/
          ├── Ubuntu22_x86_64_CPU.zip
          ├── Ubuntu22_x86_64_GPU.zip
          ├── Ubuntu24_x86_64_CPU.zip
          └── Ubuntu24_x86_64_GPU.zip

          unlicensed/
          ├── Ubuntu22_x86_64_CPU.zip
          ├── Ubuntu22_x86_64_GPU.zip
          ├── Ubuntu24_x86_64_CPU.zip
          └── Ubuntu24_x86_64_GPU.zip
          ```

          ## Zip File Contents

          Each zip file contains the following:
          - `libradarsimc.so` - Shared library
          - `radarsim.h` - Header file for C/C++ integration

          ## Platform and License Information

          ### Licensed Builds
          - **Ubuntu22_x86_64_CPU.zip**: License-enabled CPU-only build for Ubuntu 22.04 LTS
          - **Ubuntu22_x86_64_GPU.zip**: License-enabled CUDA GPU-accelerated build for Ubuntu 22.04 LTS
          - **Ubuntu24_x86_64_CPU.zip**: License-enabled CPU-only build for Ubuntu 24.04 LTS
          - **Ubuntu24_x86_64_GPU.zip**: License-enabled CUDA GPU-accelerated build for Ubuntu 24.04 LTS
          - Requires valid license file for full feature access
          - License activation via `Set_License()` or `Set_License_Files()` API
          - Verification via `Is_Licensed()` call

          ### Unlicensed Builds (Open Source)
          - **Ubuntu22_x86_64_CPU.zip**: Open source CPU-only build for Ubuntu 22.04 LTS
          - **Ubuntu22_x86_64_GPU.zip**: Open source CUDA GPU-accelerated build for Ubuntu 22.04 LTS
          - **Ubuntu24_x86_64_CPU.zip**: Open source CPU-only build for Ubuntu 24.04 LTS
          - **Ubuntu24_x86_64_GPU.zip**: Open source CUDA GPU-accelerated build for Ubuntu 24.04 LTS
          - No license verification required
          - All features enabled by default
          - Suitable for development, testing, and non-commercial use

          ## Build Information

          - **Total Builds**: 8 zip files (2 Ubuntu versions × 2 architectures × 2 license configs)
          - **Ubuntu Versions**: 22.04 LTS (GCC 11), 24.04 LTS (GCC 13)
          - **Architectures**: x86_64 CPU, x86_64 GPU (CUDA)
          - **License Configs**: Licensed (with verification), Unlicensed (open source)
          - **Library Type**: Shared library (.so)
          - **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")

          ## Usage

          1. Choose the appropriate license configuration based on your needs:
             - **Licensed**: For commercial use with valid license
             - **Unlicensed**: For development, testing, and evaluation
          2. Choose the appropriate Ubuntu version for your system
          3. Choose the appropriate architecture (CPU or GPU) for your system
          4. Extract the corresponding zip file
          5. Link against libradarsimc.so and include radarsim.h in your project

          ## License Activation (Licensed Builds Only)

          For licensed builds, place your license file (`license_radarsimc_*.lic`) in:
          - Your application's working directory, or
          - Use `Set_License()` API to activate programmatically

          Verify activation status with `Is_Licensed()` API call.

          ## Requirements

          ### Ubuntu 22.04 Builds
          - **CPU builds**: Ubuntu 22.04 LTS or newer x86_64 system
          - **GPU builds**: Ubuntu 22.04 LTS or newer x86_64 system with NVIDIA GPU and CUDA support
          - **Compiler**: Built with GCC 11

          ### Ubuntu 24.04 Builds
          - **CPU builds**: Ubuntu 24.04 LTS or newer x86_64 system
          - **GPU builds**: Ubuntu 24.04 LTS or newer x86_64 system with NVIDIA GPU and CUDA support
          - **Compiler**: Built with GCC 13
          EOF

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimlib_ubuntu_all_builds.tar.gz radarsimlib_ubuntu_all/

          # Create zip version as well
          zip -r radarsimlib_ubuntu_all_builds.zip radarsimlib_ubuntu_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radarsimlib_ubuntu_all_builds
          path: |
            packed/radarsimlib_ubuntu_all_builds.tar.gz
            packed/radarsimlib_ubuntu_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [build, pack-artifacts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "# Ubuntu RadarSimLib Build Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: 8 (2 Ubuntu versions × 2 architectures × 2 license configs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ubuntu Version Distribution" >> $GITHUB_STEP_SUMMARY
          echo "- **Ubuntu 22.04**: 4 builds (2 architectures × 2 license configs)" >> $GITHUB_STEP_SUMMARY
          echo "- **Ubuntu 24.04**: 4 builds (2 architectures × 2 license configs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $GITHUB_STEP_SUMMARY
          echo "- **CPU (x86_64)**: 4 builds (2 Ubuntu versions × 2 license configs)" >> $GITHUB_STEP_SUMMARY
          echo "- **GPU (CUDA)**: 4 builds (2 Ubuntu versions × 2 license configs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### License Configuration Distribution" >> $GITHUB_STEP_SUMMARY
          echo "- **Licensed**: 4 builds (2 Ubuntu versions × 2 architectures)" >> $GITHUB_STEP_SUMMARY
          echo "- **Unlicensed**: 4 builds (2 Ubuntu versions × 2 architectures)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "#### Ubuntu 22.04" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu22_x86_64_cpu\` (Unlicensed CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu22_x86_64_cpu_licensed\` (Licensed CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu22_x86_64_gpu_free\` (Unlicensed GPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu22_x86_64_gpu_licensed\` (Licensed GPU)" >> $GITHUB_STEP_SUMMARY
          echo "#### Ubuntu 24.04" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu24_x86_64_cpu\` (Unlicensed CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu24_x86_64_cpu_licensed\` (Licensed CPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu24_x86_64_gpu\` (Unlicensed GPU)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radarsimlib_ubuntu24_x86_64_gpu_licensed\` (Licensed GPU)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            echo "✅ **All artifacts successfully packed into single archive**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimlib_ubuntu_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All 8 build variants organized by Ubuntu version and configuration" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi