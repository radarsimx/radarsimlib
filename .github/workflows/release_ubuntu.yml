name: Build Ubuntu Libraries

# GitHub Actions workflow for building and packaging RadarSimLib on Ubuntu Linux.
#
# This workflow builds RadarSimLib across different license configurations (on/off)
# and architectures (CPU/GPU). It provides comprehensive Linux coverage with
# both CPU-only and CUDA GPU-accelerated builds.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing an Ubuntu version or architecture only
#   requires editing that one step — no other job needs to change.
# - Architectures: CPU (x86_64), GPU (CUDA)
# - All builds: License enabled (license=on)
#
# Features:
# - Comprehensive caching (apt, ccache)
# - CUDA toolkit setup for GPU builds
# - Build optimization with ccache
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by Ubuntu version and architecture
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to main branch
# - Pull requests to main branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  DEBIAN_FRONTEND: noninteractive
  CCACHE_DIR: ~/.ccache

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding Ubuntu versions/architectures.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            { "os": "ubuntu-22.04", "arch": "cpu", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "ubuntu_version": "22", "artifact_name": "radarsimlib_ubuntu22_x86_64_cpu" },
            { "os": "ubuntu-22.04", "arch": "gpu", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "ubuntu_version": "22", "artifact_name": "radarsimlib_ubuntu22_x86_64_gpu" },
            { "os": "ubuntu-24.04", "arch": "cpu", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "ubuntu_version": "24", "artifact_name": "radarsimlib_ubuntu24_x86_64_cpu" },
            { "os": "ubuntu-24.04", "arch": "gpu", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "ubuntu_version": "24", "artifact_name": "radarsimlib_ubuntu24_x86_64_gpu" },
            { "os": "ubuntu-26.04", "arch": "cpu", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "ubuntu_version": "26", "artifact_name": "radarsimlib_ubuntu26_x86_64_cpu" },
            { "os": "ubuntu-26.04", "arch": "gpu", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "ubuntu_version": "26", "artifact_name": "radarsimlib_ubuntu26_x86_64_gpu" }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup CUDA Toolkit
        if: matrix.arch == 'gpu'
        uses: radarsimx/cuda-toolkit@master
        with:
          cuda: "13.3.1"
          method: "network"
          sub-packages: '["nvcc"]'
          linux-local-args: '["--toolkit", "--silent"]'

      - name: Install CUDA cuRAND development headers
        if: matrix.arch == 'gpu'
        run: |
          sudo apt-get install -y libcurand-dev-13-3

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/apt
            ~/.ccache
          key: ${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('build.sh', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-
            ${{ runner.os }}-

      - name: Install build dependencies
        run: |
          echo "::group::Dependencies Installation"
          sudo apt-get update

          # Install common build dependencies
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            ccache

          # Set up ccache
          ccache --set-config=max_size=2G
          ccache --set-config=cache_dir=~/.ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH

          # Verify installations
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          cmake --version
          ccache --version
          echo "::endgroup::"

      - name: Verify CUDA installation
        if: matrix.arch == 'gpu'
        run: |
          echo "::group::CUDA Verification"
          nvcc --version
          echo "CUDA_PATH: $CUDA_PATH"
          echo "PATH: $PATH"
          if [ -d "$CUDA_PATH/bin" ]; then
            ls -la "$CUDA_PATH/bin/" | grep nvcc
          else
            echo "CUDA bin directory not found"
          fi
          if [ -d "$CUDA_PATH/lib64" ]; then
            echo "CUDA lib directory found"
          else
            echo "CUDA lib directory not found"
          fi
          echo "::endgroup::"

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: ${{ matrix.os }}"
          echo "Ubuntu Version: ${{ matrix.ubuntu_version }}"
          echo "License: on"
          echo "Architecture: ${{ matrix.arch }}"
          echo "C Compiler: ${{ matrix.c_compiler }}"
          echo "C++ Compiler: ${{ matrix.cxx_compiler }}"
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            nvcc_version=$(nvcc --version | grep "release" | sed 's/.*release \([0-9.]*\).*/\1/')
            echo "CUDA Version: $nvcc_version"
          fi
          echo "::endgroup::"

          echo "::group::System Information"
          lsb_release -a
          uname -a
          nproc
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            nvcc --version
          fi
          echo "::endgroup::"

      - name: Build RadarSimLib
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
          CUDA_PATH: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDA_HOME: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CUDACXX: ${{ matrix.arch == 'gpu' && format('{0}/bin/nvcc', env.CUDA_PATH) || '' }}
          CUDA_TOOLKIT_ROOT_DIR: ${{ matrix.arch == 'gpu' && env.CUDA_PATH || '' }}
          CCACHE_COMPILERCHECK: content
        run: |
          echo "::group::Build Process"
          chmod +x ./build.sh
          ./build.sh --arch=${{ matrix.arch }} --license=on --test=${{ matrix.arch == 'cpu' && 'on' || 'off' }} --verbose
          echo "::endgroup::"

      - name: Display build statistics
        if: always()
        run: |
          echo "::group::Build Statistics"
          ccache --show-stats
          echo "::endgroup::"

      - name: Create build summary
        run: |
          echo "## Build Summary 🛠️" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| OS | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ubuntu Version | ${{ matrix.ubuntu_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License | on |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | ${{ matrix.c_compiler }}/${{ matrix.cxx_compiler }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.arch }}" == "gpu" ]; then
            echo "| CUDA Version | $(nvcc --version | grep "release" | sed 's/.*release \([0-9.]*\).*/\1/') |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ./radarsimlib_ubuntu${{ matrix.ubuntu_version }}_x86_64_${{ matrix.arch }}
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            ./build_logs/
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.so" -o -name "*.h" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimlib_ubuntu_all

          # Copy each artifact to appropriate directory based on Ubuntu version and architecture
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              # Determine Ubuntu version from the artifact name (e.g. "ubuntu26" -> "Ubuntu26")
              if [[ "$artifact_name" =~ ubuntu([0-9]+) ]]; then
                ubuntu_ver="Ubuntu${BASH_REMATCH[1]}"
              else
                echo "Unknown Ubuntu version for $artifact_name, skipping"
                continue
              fi

              # Determine target directory based on artifact name
              if [[ "$artifact_name" == *"gpu"* ]]; then
                # GPU builds
                target_dir="temp/${ubuntu_ver}_x86_64_GPU"
              else
                # CPU builds
                target_dir="temp/${ubuntu_ver}_x86_64_CPU"
              fi

              # Ensure target directory exists
              mkdir -p "$target_dir"

              # Copy the library contents
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

          # Create one zip per Ubuntu version/architecture combination actually produced
          cd temp
          for combo_dir in */; do
            combo_dir="${combo_dir%/}"
            zip -r "../packed/radarsimlib_ubuntu_all/${combo_dir}.zip" "$combo_dir/"
          done
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimlib_ubuntu_all -type f | sort
          echo ""
          echo "Zip files created:"
          ls -la packed/radarsimlib_ubuntu_all/*.zip
          echo ""
          echo "Archive sizes:"
          ls -lh packed/radarsimlib_ubuntu_all/*.zip
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          # ver/gcc pairs, one per unique Ubuntu version, sorted ascending
          ubuntu_info=$(jq -r '
            [.[] | {ver: .ubuntu_version, gcc: (.c_compiler | sub("gcc-";""))}]
            | unique_by(.ver) | sort_by(.ver | tonumber) | .[] | "\(.ver) \(.gcc)"
          ' matrix.json)
          total_builds=$(jq 'length' matrix.json)
          num_versions=$(echo "$ubuntu_info" | wc -l)
          versions_str=$(echo "$ubuntu_info" | awk '{printf "%s.04 LTS (GCC %s), ", $1, $2}' | sed 's/, $//')

          {
            echo "# RadarSimLib Ubuntu Build Artifacts"
            echo
            echo "This archive contains all RadarSimLib builds for Ubuntu platforms with license features enabled."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimlib_ubuntu_all/"
            while read -r ver gcc; do
              echo "├── Ubuntu${ver}_x86_64_CPU.zip"
              echo "├── Ubuntu${ver}_x86_64_GPU.zip"
            done <<< "$ubuntu_info"
            echo '```'
            echo
            echo "## Zip File Contents"
            echo
            echo "Each zip file contains the following:"
            echo '- `libradarsimc.so` - Shared library'
            echo '- `radarsim.h` - Header file for C/C++ integration'
            echo
            echo "## Platform Information"
            echo
            echo "### All Builds (License-Enabled)"
            while read -r ver gcc; do
              echo "- **Ubuntu${ver}_x86_64_CPU.zip**: CPU-only build for Ubuntu ${ver}.04 LTS with license verification"
              echo "- **Ubuntu${ver}_x86_64_GPU.zip**: CUDA GPU-accelerated build for Ubuntu ${ver}.04 LTS with license verification"
            done <<< "$ubuntu_info"
            echo "- Requires valid license file for full feature access"
            echo '- License activation via `Set_License()` or `Set_License_Files()` API'
            echo '- Verification via `Is_Licensed()` call'
            echo
            echo "## Build Information"
            echo
            echo "- **Total Builds**: ${total_builds} zip files (${num_versions} Ubuntu versions × 2 architectures)"
            echo "- **Ubuntu Versions**: ${versions_str}"
            echo "- **Architectures**: x86_64 CPU, x86_64 GPU (CUDA)"
            echo "- **License**: All builds have license verification enabled"
            echo "- **Library Type**: Shared library (.so)"
            echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo
            echo "## Usage"
            echo
            echo "1. Choose the appropriate Ubuntu version for your system"
            echo "2. Choose the appropriate architecture (CPU or GPU) for your system"
            echo "3. Extract the corresponding zip file"
            echo "4. Link against libradarsimc.so and include radarsim.h in your project"
            echo "5. Activate your license (see below)"
            echo
            echo "## License Activation"
            echo
            echo 'Place your license file (`license_radarsimc_*.lic`) in:'
            echo "- Your application's working directory, or"
            echo '- Use `Set_License()` API to activate programmatically'
            echo
            echo 'Verify activation status with `Is_Licensed()` API call.'
            echo
            echo "## Requirements"
            while read -r ver gcc; do
              echo
              echo "### Ubuntu ${ver}.04 Builds"
              echo "- **CPU builds**: Ubuntu ${ver}.04 LTS or newer x86_64 system"
              echo "- **GPU builds**: Ubuntu ${ver}.04 LTS or newer x86_64 system with NVIDIA GPU and CUDA support"
              echo "- **Compiler**: Built with GCC ${gcc}"
              echo "- Valid RadarSimLib license file"
            done <<< "$ubuntu_info"
          } > packed/radarsimlib_ubuntu_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimlib_ubuntu_all_builds.tar.gz radarsimlib_ubuntu_all/

          # Create zip version as well
          zip -r radarsimlib_ubuntu_all_builds.zip radarsimlib_ubuntu_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimlib_ubuntu_all_builds
          path: |
            packed/radarsimlib_ubuntu_all_builds.tar.gz
            packed/radarsimlib_ubuntu_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json
          total_builds=$(jq 'length' matrix.json)
          ubuntu_versions=$(jq -r '[.[].ubuntu_version] | unique | .[]' matrix.json)
          num_versions=$(echo "$ubuntu_versions" | wc -l)
          versions_list=$(echo "$ubuntu_versions" | awk '{printf "%s.04, ", $1}' | sed 's/, $//')

          echo "# Ubuntu RadarSimLib Build Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: ${total_builds} (${num_versions} Ubuntu versions × 2 architectures with license enabled)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ubuntu Version Distribution" >> $GITHUB_STEP_SUMMARY
          while read -r ver; do
            echo "- **Ubuntu ${ver}.04**: 2 builds (CPU and GPU)" >> $GITHUB_STEP_SUMMARY
          done <<< "$ubuntu_versions"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $GITHUB_STEP_SUMMARY
          echo "- **CPU (x86_64)**: ${num_versions} builds (Ubuntu ${versions_list})" >> $GITHUB_STEP_SUMMARY
          echo "- **GPU (CUDA)**: ${num_versions} builds (Ubuntu ${versions_list})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### License Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- All builds: License verification enabled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          while read -r ver; do
            echo "#### Ubuntu ${ver}.04" >> $GITHUB_STEP_SUMMARY
            jq -r --arg v "$ver" '.[] | select(.ubuntu_version == $v) | "- `\(.artifact_name)` (\(.arch | ascii_upcase) build with license)"' matrix.json >> $GITHUB_STEP_SUMMARY
          done <<< "$ubuntu_versions"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            echo "✅ **All artifacts successfully packed into single archive**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimlib_ubuntu_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All ${total_builds} build variants with license verification" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
