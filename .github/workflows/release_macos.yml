name: Build macOS Libraries

# GitHub Actions workflow for building and packaging RadarSimLib on macOS platforms.
#
# This workflow builds RadarSimLib across for macOS
# with license verification enabled.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing a macOS architecture only requires editing
#   that one step — no other job needs to change.
# - All builds: License enabled (license=on)
#
# Features:
# - Comprehensive caching (Homebrew, ccache)
# - Build optimization with ccache
# - Xcode version management
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build
# - Packed archive containing all builds
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch
# - Push to main branch
# - Pull requests to main branch

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_CLEANUP: 1

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding macOS architectures/versions.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            {
              "os": "macos-26-intel",
              "arch": "x86_64",
              "dir_label": "x86_64",
              "platform_name": "Intel",
              "platform_plural": "Intel-based Macs",
              "platform_singular": "Intel-based Mac",
              "min_macos_version": "13",
              "c_compiler": "clang",
              "cxx_compiler": "clang++",
              "xcode_version": "26.4.1",
              "artifact_name": "radarsimlib_macos_x86_64_cpu"
            },
            {
              "os": "macos-26",
              "arch": "arm64",
              "dir_label": "ARM64",
              "platform_name": "Apple Silicon",
              "platform_plural": "Apple Silicon Macs",
              "platform_singular": "Apple Silicon Mac",
              "min_macos_version": "15",
              "c_compiler": "clang",
              "cxx_compiler": "clang++",
              "xcode_version": "26.4.1",
              "artifact_name": "radarsimlib_macos_arm64_cpu"
            }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.RADARSIMCPP }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode_version }}

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/Homebrew
            ~/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.arch }}-${{ hashFiles('build.sh', 'CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.arch }}-
            ${{ runner.os }}-${{ matrix.os }}-

      - name: Install system dependencies
        run: |
          # Install ccache for faster compilation
          brew install ccache
          echo "$(brew --prefix ccache)/bin" >> $GITHUB_PATH

          # Set up ccache
          ccache --set-config=max_size=2G
          ccache --set-config=cache_dir=~/.ccache

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: ${{ matrix.os }}"
          echo "License: on"
          echo "Architecture: ${{ matrix.arch }}"
          echo "C Compiler: ${{ matrix.c_compiler }}"
          echo "C++ Compiler: ${{ matrix.cxx_compiler }}"
          echo "Xcode Version: ${{ matrix.xcode_version }}"
          echo "::endgroup::"

          echo "::group::System Information"
          uname -a
          sw_vers
          xcodebuild -version
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          sysctl -n hw.ncpu
          echo "::endgroup::"

      - name: Build RadarSimLib
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
          CCACHE_DIR: ~/.ccache
          CCACHE_COMPILERCHECK: content
        run: |
          echo "::group::Build Process"
          chmod +x ./build.sh
          ./build.sh --arch=cpu --license=on --test=${{ matrix.arch == 'x86_64' && 'on' || 'off' }} --verbose
          echo "::endgroup::"

      - name: Display build statistics
        if: always()
        run: |
          echo "::group::Build Statistics"
          ccache --show-stats
          echo "::endgroup::"

      - name: Create build summary
        run: |
          echo "## Build Summary 🛠️" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| OS | ${{ matrix.os }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License | on |" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Compiler | ${{ matrix.c_compiler }}/${{ matrix.cxx_compiler }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Xcode Version | ${{ matrix.xcode_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Name | ${{ matrix.artifact_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ./radarsimlib_macos_${{ matrix.arch }}_cpu
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            ./build_logs/
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.dylib" -o -name "*.h" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimlib_macos_all

          # Build artifact_name -> dir_label lookup table from the matrix
          declare -A dir_label_for
          while IFS=$'\t' read -r name label; do
            dir_label_for["$name"]="$label"
          done < <(jq -r '.[] | [.artifact_name, .dir_label] | @tsv' matrix.json)

          # Copy each artifact to its matrix-defined directory
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              label="${dir_label_for[$artifact_name]}"
              if [ -z "$label" ]; then
                echo "Unknown artifact $artifact_name, skipping"
                continue
              fi
              target_dir="temp/MacOS_${label}_CPU"

              mkdir -p "$target_dir"
              echo "Copying library from $dir to $target_dir/"
              cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
            fi
          done

          # Create one zip per architecture actually produced
          cd temp
          for combo_dir in */; do
            combo_dir="${combo_dir%/}"
            zip -r "../packed/radarsimlib_macos_all/${combo_dir}.zip" "$combo_dir/"
          done
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimlib_macos_all -type f | sort
          echo ""
          echo "Zip files created:"
          ls -la packed/radarsimlib_macos_all/*.zip
          echo ""
          echo "Archive sizes:"
          ls -lh packed/radarsimlib_macos_all/*.zip
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          total_builds=$(jq 'length' matrix.json)
          arch_summary=$(jq -r '[.[] | "\(.platform_name) \(.dir_label)"] | join(" and ")' matrix.json)
          arch_list=$(jq -r '[.[] | "\(.dir_label) (\(.platform_name))"] | join(", ")' matrix.json)
          names=$(jq -r '.[] | "MacOS_\(.dir_label)_CPU.zip"' matrix.json)
          n=$(echo "$names" | wc -l)

          {
            echo "# RadarSimLib macOS Build Artifacts"
            echo
            echo "This archive contains all RadarSimLib builds for macOS platforms with license features enabled."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimlib_macos_all/"
            i=0
            while read -r name; do
              i=$((i+1))
              if [ "$i" -eq "$n" ]; then
                echo "└── ${name}"
              else
                echo "├── ${name}"
              fi
            done <<< "$names"
            echo '```'
            echo
            echo "## Zip File Contents"
            echo
            echo "Each zip file contains the following:"
            echo '- `libradarsimc.dylib` - Dynamic library'
            echo '- `radarsim.h` - Header file for C/C++ integration'
            echo
            echo "## Platform Information"
            echo
            echo "### All Builds (License-Enabled)"
            jq -r '.[] | "- **MacOS_\(.dir_label)_CPU.zip**: Build for \(.platform_plural) with license verification"' matrix.json
            echo "- Requires valid license file for full feature access"
            echo '- License activation via `Set_License()` or `Set_License_Files()` API'
            echo '- Verification via `Is_Licensed()` call'
            echo
            echo "## Build Information"
            echo
            echo "- **Total Builds**: ${total_builds} zip files (${arch_summary})"
            echo "- **Architectures**: ${arch_list}"
            echo "- **License**: All builds have license verification enabled"
            echo "- **Library Type**: Dynamic library (.dylib)"
            jq -r '.[] | "- **\(.platform_name) Builds**: Built on \(.os) (Xcode \(.xcode_version)) with \(.c_compiler) compiler"' matrix.json
            echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo
            echo "## Usage"
            echo
            echo "1. Choose the appropriate architecture for your Mac:"
            jq -r '.[] | "   - \(.platform_plural): MacOS_\(.dir_label)_CPU.zip"' matrix.json
            echo "2. Extract the corresponding zip file"
            echo "3. Link against libradarsimc.dylib and include radarsim.h in your project"
            echo "4. Activate your license (see below)"
            echo
            echo "## License Activation"
            echo
            echo 'Place your license file (`license_radarsimc_*.lic`) in:'
            echo "- Your application's working directory, or"
            echo '- Use `Set_License()` API to activate programmatically'
            echo
            echo 'Verify activation status with `Is_Licensed()` API call.'
            echo
            echo "## Requirements"
            jq -r '.[] | "\n### \(.platform_name) Macs (MacOS_\(.dir_label)_CPU.zip)\n- \(.platform_singular) with \(.dir_label) architecture\n- macOS \(.min_macos_version) or newer recommended\n- Valid RadarSimLib license file"' matrix.json
          } > packed/radarsimlib_macos_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimlib_macos_all_builds.tar.gz radarsimlib_macos_all/

          # Create zip version as well
          zip -r radarsimlib_macos_all_builds.zip radarsimlib_macos_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimlib_macos_all_builds
          path: |
            packed/radarsimlib_macos_all_builds.tar.gz
            packed/radarsimlib_macos_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: macos-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json
          total_builds=$(jq 'length' matrix.json)
          arch_summary=$(jq -r '[.[] | "\(.platform_name) \(.dir_label)"] | join(" and ")' matrix.json)

          echo "# macOS RadarSimLib Build Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: ${total_builds} (${arch_summary} with license enabled)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $GITHUB_STEP_SUMMARY
          jq -r '.[] | "- **\(.dir_label) (\(.platform_name))**: 1 build on \(.os)"' matrix.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### License Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- All builds: License verification enabled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          jq -r '.[] | "- `\(.artifact_name)` (\(.platform_name) build with license)"' matrix.json >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            echo "✅ **All artifacts successfully packed into single archive**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimlib_macos_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All ${total_builds} build variants with license verification" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
